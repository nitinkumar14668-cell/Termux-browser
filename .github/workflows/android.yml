name: Build Termux Browser APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        cache-disabled: true
        validate-wrappers: false

    - name: Create .env from .env.example
      run: cp .env.example .env

    - name: Regenerate Gradle Wrapper
      run: gradle wrapper

    - name: Decode Debug Keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          base64 -d debug.keystore.base64 > debug.keystore
        else
          echo "debug.keystore.base64 not found, generating a fresh debug keystore..."
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        fi

    - name: Make Gradle Wrapper Executable
      run: chmod +x gradlew

    - name: Build APKs and Bundles
      run: ./gradlew assembleDebug assembleRelease bundleRelease

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: termux-browser-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
        retention-days: 7

    - name: Upload Release APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: termux-browser-release-apk
        path: app/build/outputs/apk/release/app-release.apk
        if-no-files-found: error
        retention-days: 7

    - name: Upload Release AAB Artifact
      uses: actions/upload-artifact@v4
      with:
        name: termux-browser-release-aab
        path: app/build/outputs/bundle/release/app-release.aab
        if-no-files-found: error
        retention-days: 7
