name: Build Termux Browser APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        cache-disabled: true
        validate-wrappers: false

    - name: Create .env from .env.example
      run: cp .env.example .env

    - name: Decode Debug Keystore
      run: base64 -d debug.keystore.base64 > debug.keystore

    - name: Make Gradle Wrapper Executable
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --no-configuration-cache

    - name: Upload Compiled APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: termux-browser-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
        retention-days: 7
